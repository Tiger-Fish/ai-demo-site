<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>競合比較シミュレーター | 指月電機製作所</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0a1628;--navy2:#132040;--navy3:#1e3060;
  --accent:#2e7de0;--accent2:#5b9ef7;
  --gold:#c9a84c;--gold2:#e8c97a;
  --green:#16a34a;--red:#dc2626;--orange:#ea580c;--teal:#0d9488;
  --text:#1a1a2e;--text2:#3a4a6a;--text3:#6a7a9a;
  --bg:#f4f6fb;--bg2:#fff;--bg3:#eef2fa;
  --border:#dde4f0;
  --shadow:0 2px 16px rgba(10,22,40,.08);
  --shadow2:0 8px 32px rgba(10,22,40,.14);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy3) 100%);color:white;padding:0;position:relative;overflow:hidden}
header::before{content:'';position:absolute;top:-60px;right:-60px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(46,125,224,.2),transparent 70%)}
.header-inner{max-width:900px;margin:0 auto;padding:40px 24px 36px;position:relative;z-index:1}
.header-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(46,125,224,.25);border:1px solid var(--accent2);color:var(--accent3);font-size:11px;font-weight:700;letter-spacing:.1em;padding:4px 14px;border-radius:20px;margin-bottom:14px}
header h1{font-size:clamp(22px,4vw,32px);font-weight:700;line-height:1.35;margin-bottom:8px}
header h1 span{color:var(--accent3)}
header p{font-size:14px;color:rgba(255,255,255,.7);line-height:1.7}

main{max-width:900px;margin:0 auto;padding:40px 24px 80px}

.form-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:32px;box-shadow:var(--shadow);margin-bottom:20px}
.form-card h2{font-size:17px;font-weight:700;color:var(--navy);margin-bottom:6px;display:flex;align-items:center;gap:10px}
.form-card h2 .icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--navy3));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.form-card p.desc{font-size:13px;color:var(--text3);margin-bottom:20px;line-height:1.6}

.comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:600px){.comp-grid{grid-template-columns:1fr}}

.comp-col{background:var(--bg3);border:1.5px solid var(--border);border-radius:12px;padding:20px}
.comp-col.shizuki{border-color:var(--accent);background:#eff6ff}
.comp-col-label{font-size:11px;font-weight:700;letter-spacing:.1em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.comp-col.shizuki .comp-col-label{color:var(--accent)}
.comp-col.rival .comp-col-label{color:var(--text3)}
.col-badge{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:700}
.badge-shizuki{background:var(--accent);color:white}
.badge-rival{background:var(--text3);color:white}

.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.form-group:last-child{margin-bottom:0}
label{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.05em}
.form-input,.form-select,.form-textarea{padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--text);background:white;transition:border .2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--accent);background:white}
.form-textarea{min-height:80px;resize:vertical}

.context-area{margin-top:20px}
.context-area .form-group{margin-bottom:0}

.generate-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--accent),var(--navy3));color:white;border:none;border-radius:12px;font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:20px}
.generate-btn:hover{filter:brightness(1.1);transform:translateY(-1px)}

/* ローディング */
#loading{display:none;text-align:center;padding:48px}
.loading-spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* 結果 */
#result-section{display:none}

/* 比較テーブル */
.compare-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow2);margin-bottom:20px}
.compare-header{background:linear-gradient(135deg,var(--navy),var(--navy3));color:white;padding:24px 28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.compare-header h3{font-size:18px;font-weight:700}
.winner-badge{background:var(--gold);color:var(--navy);font-size:12px;font-weight:700;padding:4px 14px;border-radius:12px}

.compare-table{width:100%;border-collapse:collapse}
.compare-table th{padding:12px 16px;text-align:left;font-size:12px;font-weight:700;letter-spacing:.05em;border-bottom:2px solid var(--border)}
.compare-table th.shizuki-col{background:#eff6ff;color:var(--accent)}
.compare-table th.rival-col{background:var(--bg3);color:var(--text3)}
.compare-table th.item-col{background:var(--bg3);color:var(--text3);width:22%}
.compare-table td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;line-height:1.6;vertical-align:top}
.compare-table tr:last-child td{border-bottom:none}
.compare-table td.item-name{font-weight:700;color:var(--navy);font-size:12px}
.compare-table td.shizuki-val{background:#f8fbff;color:var(--text)}
.compare-table td.rival-val{background:var(--bg3);color:var(--text2)}
.win{color:var(--green);font-weight:700}
.lose{color:var(--red)}
.draw{color:var(--orange)}
.win-icon::before{content:'◎ '}
.lose-icon::before{content:'△ ';color:var(--red)}

/* 強み・弱み */
.swot-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:24px;border-top:1px solid var(--border)}
@media(max-width:600px){.swot-grid{grid-template-columns:1fr}}
.swot-card{border-radius:10px;padding:18px}
.swot-card.strength{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1px solid #86efac}
.swot-card.weakness{background:linear-gradient(135deg,#fff7ed,#ffedd5);border:1px solid #fdba74}
.swot-card h4{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.swot-card.strength h4{color:var(--green)}
.swot-card.weakness h4{color:var(--orange)}
.swot-card ul{padding-left:16px}
.swot-card li{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:3px}

/* トーク例 */
.talk-section{padding:24px;border-top:1px solid var(--border)}
.talk-section h4{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:12px}
.talk-item{background:var(--bg3);border-radius:10px;padding:16px;margin-bottom:10px}
.talk-item:last-child{margin-bottom:0}
.talk-label{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.08em;margin-bottom:6px}
.talk-text{font-size:13px;color:var(--text2);line-height:1.85;font-style:italic}
.talk-text::before{content:'"'}
.talk-text::after{content:'"'}

.action-btns{display:flex;gap:12px;flex-wrap:wrap}
.action-btn{padding:11px 22px;border-radius:10px;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--navy);color:white;border:none}
.btn-primary:hover{background:var(--navy3)}
.btn-reset{background:var(--bg3);color:var(--text2);border:1.5px solid var(--border)}
.btn-reset:hover{border-color:var(--accent);color:var(--accent)}

footer{background:var(--navy);color:rgba(255,255,255,.5);text-align:center;padding:24px;font-size:12px}
.back-btn{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.8);text-decoration:none;padding:8px 18px;border-radius:8px;font-size:12px;margin-bottom:12px;transition:all .2s}
.back-btn:hover{background:rgba(255,255,255,.18);color:white}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-badge">⚔️ AI競合比較ツール</div>
    <h1>競合<span>比較</span><br>シミュレーター</h1>
    <p>自社製品と競合製品のスペックを入力するだけで、AIが優位性を分析して営業トーク例を自動生成します。</p>
  </div>
</header>

<main>
  <div id="form-section">
    <div class="form-card">
      <h2><span class="icon">⚔️</span>製品情報を入力</h2>
      <p class="desc">指月電機製品と競合製品の情報を入力してください。わかっている範囲で構いません。</p>

      <div class="comp-grid">
        <!-- 指月電機 -->
        <div class="comp-col shizuki">
          <div class="comp-col-label">
            <span class="col-badge badge-shizuki">自社</span>
            指月電機製作所
          </div>
          <div class="form-group">
            <label>製品シリーズ名</label>
            <input class="form-input" id="s-name" placeholder="例：PPフィルムコンデンサ DCリンク用" type="text">
          </div>
          <div class="form-group">
            <label>定格電圧</label>
            <input class="form-input" id="s-voltage" placeholder="例：450〜1200VDC" type="text">
          </div>
          <div class="form-group">
            <label>静電容量範囲</label>
            <input class="form-input" id="s-cap" placeholder="例：10〜500μF" type="text">
          </div>
          <div class="form-group">
            <label>動作温度</label>
            <input class="form-input" id="s-temp" placeholder="例：-40〜+105℃" type="text">
          </div>
          <div class="form-group">
            <label>特徴・強み</label>
            <textarea class="form-textarea" id="s-features" placeholder="例：低ESR・低損失、国内一貫製造、高信頼性、AEC-Q200対応、カスタム対応可"></textarea>
          </div>
        </div>

        <!-- 競合 -->
        <div class="comp-col rival">
          <div class="comp-col-label">
            <span class="col-badge badge-rival">競合</span>
            競合製品情報
          </div>
          <div class="form-group">
            <label>競合メーカー・製品名</label>
            <input class="form-input" id="r-name" placeholder="例：○○社 Aシリーズ" type="text">
          </div>
          <div class="form-group">
            <label>定格電圧</label>
            <input class="form-input" id="r-voltage" placeholder="例：400〜1000VDC" type="text">
          </div>
          <div class="form-group">
            <label>静電容量範囲</label>
            <input class="form-input" id="r-cap" placeholder="例：10〜300μF" type="text">
          </div>
          <div class="form-group">
            <label>動作温度</label>
            <input class="form-input" id="r-temp" placeholder="例：-25〜+85℃" type="text">
          </div>
          <div class="form-group">
            <label>特徴・既知の弱点</label>
            <textarea class="form-textarea" id="r-features" placeholder="例：海外量産品、カスタム対応不可、サポートが遅い、供給が不安定なことがある"></textarea>
          </div>
        </div>
      </div>

      <div class="context-area">
        <div class="form-group">
          <label>商談の背景・顧客の重視ポイント（任意）</label>
          <textarea class="form-textarea" id="context" placeholder="例：顧客はEV向けインバータに使用予定。信頼性と長期供給安定性を重視している。現在競合品を使用中で、コストは同等か低い方が望ましい。"></textarea>
        </div>
      </div>

      <button class="generate-btn" onclick="generateComparison()">
        🤖 AIで競合比較・トーク例を生成する
      </button>
    </div>
  </div>

  <div id="loading">
    <div class="loading-spinner"></div>
    <p style="color:var(--text3);font-size:14px;font-weight:500">AIが競合分析・トーク例を生成中...</p>
  </div>

  <div id="result-section">
    <div class="compare-card" id="compare-card"></div>
    <div class="action-btns">
      <button class="action-btn btn-primary" onclick="window.print()">🖨️ 印刷・保存</button>
      <button class="action-btn btn-reset" onclick="location.reload()">↺ 新しい比較を作成</button>
    </div>
  </div>
</main>

<footer>
  <a href="index.html" class="back-btn">← デモサイトトップへ戻る</a>
  <p>© 株式会社指月電機製作所 | AI競合比較シミュレーター（デモ）</p>
</footer>

<script>
async function generateComparison() {
  const sName = document.getElementById('s-name').value || '指月電機 PPフィルムコンデンサ';
  const sVoltage = document.getElementById('s-voltage').value || '要確認';
  const sCap = document.getElementById('s-cap').value || '要確認';
  const sTemp = document.getElementById('s-temp').value || '要確認';
  const sFeatures = document.getElementById('s-features').value || '高品質・高信頼性・国内製造';
  const rName = document.getElementById('r-name').value || '競合製品';
  const rVoltage = document.getElementById('r-voltage').value || '要確認';
  const rCap = document.getElementById('r-cap').value || '要確認';
  const rTemp = document.getElementById('r-temp').value || '要確認';
  const rFeatures = document.getElementById('r-features').value || '海外量産品';
  const context = document.getElementById('context').value || '';

  document.getElementById('form-section').style.display = 'none';
  document.getElementById('loading').style.display = 'block';

  const prompt = `あなたは指月電機製作所の営業アドバイザーです。以下の製品情報を比較分析し、営業トーク例を生成してください。

【指月電機製品】
- 製品名: ${sName}
- 定格電圧: ${sVoltage}
- 静電容量: ${sCap}
- 動作温度: ${sTemp}
- 特徴: ${sFeatures}

【競合製品】
- 製品名: ${rName}
- 定格電圧: ${rVoltage}
- 静電容量: ${rCap}
- 動作温度: ${rTemp}
- 特徴・弱点: ${rFeatures}

【商談背景】${context || 'なし'}

以下のJSON形式のみで回答してください：
{
  "summary": "比較結果の一言サマリー（30字程度）",
  "winner": "指月電機製作所",
  "comparison": [
    {"item": "耐電圧性能", "shizuki": "評価コメント", "rival": "評価コメント", "advantage": "shizuki"},
    {"item": "温度特性・耐熱性", "shizuki": "評価コメント", "rival": "評価コメント", "advantage": "shizuki"},
    {"item": "信頼性・品質", "shizuki": "評価コメント", "rival": "評価コメント", "advantage": "shizuki"},
    {"item": "供給安定性", "shizuki": "評価コメント", "rival": "評価コメント", "advantage": "shizuki"},
    {"item": "技術サポート", "shizuki": "評価コメント", "rival": "評価コメント", "advantage": "shizuki"},
    {"item": "カスタム対応", "shizuki": "評価コメント", "rival": "評価コメント", "advantage": "shizuki"}
  ],
  "strengths": ["強み1", "強み2", "強み3", "強み4"],
  "cautions": ["注意点1", "注意点2"],
  "talk_examples": [
    {"scene": "シーン名（例：価格を指摘された時）", "talk": "営業トーク例（2〜3文）"},
    {"scene": "シーン名", "talk": "営業トーク例"},
    {"scene": "シーン名", "talk": "営業トーク例"}
  ]
}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1500,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data = await response.json();
    const text = data.content[0].text.replace(/```json|```/g,'').trim();
    const r = JSON.parse(text);
    showResult(r, sName, rName);
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('result-section').style.display = 'block';
    document.getElementById('compare-card').innerHTML = `
      <div style="text-align:center;padding:48px 24px">
        <div style="font-size:40px;margin-bottom:16px">🔑</div>
        <div style="font-size:16px;font-weight:700;color:var(--navy);margin-bottom:12px">デモのため回答は生成されません</div>
        <div style="font-size:14px;color:var(--text2);line-height:1.85;max-width:400px;margin:0 auto 24px;background:var(--bg3);border-radius:10px;padding:16px 20px;border-left:4px solid var(--gold)">
          APIキーを設定することで動作します。<br>
          <span style="font-size:12px;color:var(--text3)">※ APIキーの利用には別途課金が必要になります。</span>
        </div>
      </div>
    `;
  }
}

function showResult(r, sName, rName) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('result-section').style.display = 'block';

  const compRows = r.comparison.map(c => {
    const sClass = c.advantage === 'shizuki' ? 'win win-icon' : c.advantage === 'rival' ? 'lose lose-icon' : '';
    const rClass = c.advantage === 'rival' ? 'win win-icon' : c.advantage === 'shizuki' ? 'lose lose-icon' : '';
    return `<tr>
      <td class="item-name">${c.item}</td>
      <td class="shizuki-val"><span class="${sClass}">${c.shizuki}</span></td>
      <td class="rival-val"><span class="${rClass}">${c.rival}</span></td>
    </tr>`;
  }).join('');

  const strengthsHTML = r.strengths.map(s => `<li>${s}</li>`).join('');
  const cautionsHTML = r.cautions.map(c => `<li>${c}</li>`).join('');
  const talksHTML = r.talk_examples.map(t => `
    <div class="talk-item">
      <div class="talk-label">📍 ${t.scene}</div>
      <div class="talk-text">${t.talk}</div>
    </div>`).join('');

  document.getElementById('compare-card').innerHTML = `
    <div class="compare-header">
      <div>
        <h3>競合比較レポート</h3>
        <div style="font-size:13px;color:rgba(255,255,255,.7);margin-top:4px">${sName} vs ${rName}</div>
      </div>
      <div class="winner-badge">✦ ${r.summary}</div>
    </div>

    <div style="overflow-x:auto">
      <table class="compare-table">
        <thead>
          <tr>
            <th class="item-col">比較項目</th>
            <th class="shizuki-col">◎ ${sName}</th>
            <th class="rival-col">△ ${rName}</th>
          </tr>
        </thead>
        <tbody>${compRows}</tbody>
      </table>
    </div>

    <div class="swot-grid">
      <div class="swot-card strength">
        <h4>✦ 指月電機の優位ポイント</h4>
        <ul>${strengthsHTML}</ul>
      </div>
      <div class="swot-card weakness">
        <h4>⚠️ 商談での注意点</h4>
        <ul>${cautionsHTML}</ul>
      </div>
    </div>

    <div class="talk-section">
      <h4>💬 営業トーク例（AI自動生成）</h4>
      ${talksHTML}
    </div>
  `;

  document.getElementById('result-section').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
