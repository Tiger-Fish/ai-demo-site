<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会社法 逐条学習アプリ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500&family=BIZ+UDGothic:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --ink-light: #2d2d4e;
    --paper: #f5f0e8;
    --paper-warm: #ede8d8;
    --accent: #8b1a1a;
    --accent-light: #c0392b;
    --gold: #c9a84c;
    --gold-light: #e8d5a3;
    --success: #2d6a4f;
    --success-bg: #d8f3dc;
    --fail: #8b1a1a;
    --fail-bg: #fde8e8;
    --unseen: #555577;
    --unseen-bg: #eeeef5;
    --border: #c8bfa8;
    --shadow: 0 2px 12px rgba(26,26,46,0.12);
    --shadow-deep: 0 8px 32px rgba(26,26,46,0.2);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(201,168,76,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(139,26,26,0.05) 0%, transparent 60%);
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-deep);
  }
  .header-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--gold);
  }
  .header-nav { display: flex; gap: 0.5rem; }
  .nav-btn {
    background: none;
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--paper);
    padding: 0.35rem 0.9rem;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.78rem;
    transition: all 0.2s;
  }
  .nav-btn:hover, .nav-btn.active {
    background: var(--gold);
    color: var(--ink);
    border-color: var(--gold);
    font-weight: 700;
  }

  /* ── SCREENS ── */
  .screen { display: none; padding: 2rem; max-width: 960px; margin: 0 auto; }
  .screen.active { display: block; }

  /* ── SCREEN: HOME ── */
  .home-hero {
    background: var(--ink);
    color: var(--paper);
    border-radius: 12px;
    padding: 2rem 2.5rem;
    margin-bottom: 2rem;
    position: relative;
    overflow: hidden;
  }
  .home-hero::before {
    content: '会社法';
    position: absolute;
    right: 1.5rem;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Noto Serif JP', serif;
    font-size: 5rem;
    font-weight: 700;
    color: rgba(201,168,76,0.12);
    letter-spacing: 0.1em;
    pointer-events: none;
  }
  .home-hero h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    color: var(--gold);
  }
  .home-hero p { font-size: 0.88rem; color: rgba(245,240,232,0.7); line-height: 1.7; }

  .progress-bar-wrap {
    background: var(--paper-warm);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }
  .progress-stats { display: flex; gap: 2rem; flex: 1; }
  .stat-item { text-align: center; }
  .stat-num { font-family: 'Noto Serif JP', serif; font-size: 1.8rem; font-weight: 700; line-height: 1; }
  .stat-num.passed { color: var(--success); }
  .stat-num.failed { color: var(--fail); }
  .stat-num.total { color: var(--ink); }
  .stat-label { font-size: 0.72rem; color: #666; margin-top: 0.2rem; }
  .progress-bar-outer {
    flex: 2;
    background: var(--unseen-bg);
    border-radius: 99px;
    height: 12px;
    overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--success), var(--gold));
    border-radius: 99px;
    transition: width 0.5s ease;
  }

  .section-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 2px solid var(--gold);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .section-title span { font-size: 0.8rem; color: #888; font-weight: 400; font-family: 'Noto Sans JP'; }

  /* chapter grouping */
  .chapter-group { margin-bottom: 1.5rem; }
  .chapter-label {
    font-size: 0.72rem;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
    padding-left: 0.25rem;
    border-left: 3px solid var(--accent);
    padding-left: 0.5rem;
  }

  .article-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 0.5rem;
  }
  .article-btn {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.4rem;
    cursor: pointer;
    text-align: center;
    font-family: 'BIZ UDGothic', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    transition: all 0.15s;
    position: relative;
  }
  .article-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
  .article-btn.passed {
    background: var(--success-bg);
    border-color: var(--success);
    color: var(--success);
  }
  .article-btn.failed {
    background: var(--fail-bg);
    border-color: var(--fail);
    color: var(--fail);
  }
  .article-btn.unseen {
    background: white;
    color: var(--unseen);
    border-color: var(--border);
  }
  .article-btn .art-status {
    display: block;
    font-size: 0.65rem;
    font-weight: 400;
    margin-top: 0.15rem;
    opacity: 0.8;
  }
  .fail-badge {
    position: absolute;
    top: -4px; right: -4px;
    background: var(--fail);
    color: white;
    border-radius: 99px;
    font-size: 0.6rem;
    width: 16px; height: 16px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
  }

  /* ── SCREEN: STUDY ── */
  .study-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .back-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 0.4rem 0.8rem;
    cursor: pointer;
    font-size: 0.82rem;
    color: var(--ink);
    font-family: 'Noto Sans JP';
    transition: all 0.15s;
  }
  .back-btn:hover { background: var(--ink); color: var(--paper); }

  .article-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    margin-bottom: 1.5rem;
    box-shadow: var(--shadow);
  }
  .article-number {
    font-family: 'Noto Serif JP', serif;
    font-size: 0.85rem;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.05em;
    margin-bottom: 0.5rem;
  }
  .article-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 1rem;
    color: var(--ink);
  }
  .article-text {
    background: var(--paper-warm);
    border-left: 4px solid var(--gold);
    border-radius: 0 8px 8px 0;
    padding: 1rem 1.25rem;
    font-size: 0.88rem;
    line-height: 1.9;
    color: var(--ink-light);
    font-family: 'Noto Serif JP', serif;
    margin-bottom: 1.5rem;
  }
  .explanation-block {
    border-top: 1px dashed var(--border);
    padding-top: 1.25rem;
  }
  .explanation-label {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.12em;
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .explanation-label::before {
    content: '';
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--gold);
    border-radius: 2px;
  }
  .explanation-text {
    font-size: 0.9rem;
    line-height: 2;
    color: var(--ink);
  }
  .explanation-text p { margin-bottom: 0.75rem; }
  .explanation-text strong { color: var(--accent); }
  .point-list {
    list-style: none;
    padding: 0;
    margin: 0.75rem 0;
  }
  .point-list li {
    display: flex;
    gap: 0.6rem;
    padding: 0.4rem 0;
    font-size: 0.88rem;
    line-height: 1.7;
    border-bottom: 1px dotted var(--border);
  }
  .point-list li:last-child { border-bottom: none; }
  .point-list li::before {
    content: '▶';
    color: var(--gold);
    font-size: 0.7rem;
    margin-top: 0.3rem;
    flex-shrink: 0;
  }

  /* QUIZ */
  .quiz-card {
    background: var(--ink);
    color: var(--paper);
    border-radius: 12px;
    padding: 1.75rem 2rem;
    margin-bottom: 1.5rem;
    box-shadow: var(--shadow-deep);
  }
  .quiz-label {
    font-size: 0.72rem;
    color: var(--gold);
    font-weight: 700;
    letter-spacing: 0.15em;
    margin-bottom: 1rem;
  }
  .quiz-question {
    font-family: 'Noto Serif JP', serif;
    font-size: 1rem;
    line-height: 1.8;
    margin-bottom: 1.5rem;
  }
  .quiz-options { display: flex; flex-direction: column; gap: 0.6rem; }
  .quiz-option {
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(245,240,232,0.2);
    border-radius: 8px;
    padding: 0.8rem 1.1rem;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.9rem;
    color: var(--paper);
    text-align: left;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .quiz-option:hover:not(:disabled) {
    background: rgba(201,168,76,0.2);
    border-color: var(--gold);
  }
  .quiz-option.correct {
    background: rgba(45,106,79,0.4);
    border-color: #4caf7d;
    color: #a8f0c6;
  }
  .quiz-option.incorrect {
    background: rgba(139,26,26,0.4);
    border-color: #c0392b;
    color: #ffb3b3;
  }
  .quiz-option .opt-key {
    background: rgba(255,255,255,0.15);
    border-radius: 4px;
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.78rem;
    font-weight: 700;
    flex-shrink: 0;
  }
  .quiz-option.correct .opt-key { background: rgba(76,175,125,0.4); }
  .quiz-option.incorrect .opt-key { background: rgba(192,57,43,0.4); }

  .quiz-result {
    margin-top: 1.25rem;
    padding: 1rem 1.25rem;
    border-radius: 8px;
    font-size: 0.9rem;
    line-height: 1.7;
    display: none;
  }
  .quiz-result.show { display: block; }
  .quiz-result.correct-result {
    background: rgba(45,106,79,0.3);
    border: 1px solid #4caf7d;
    color: #a8f0c6;
  }
  .quiz-result.incorrect-result {
    background: rgba(139,26,26,0.3);
    border: 1px solid #c0392b;
    color: #ffb3b3;
  }

  .action-row {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.25rem;
    flex-wrap: wrap;
  }
  .btn-primary {
    background: var(--gold);
    color: var(--ink);
    border: none;
    border-radius: 8px;
    padding: 0.7rem 1.5rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary:hover { background: var(--accent); color: white; }
  .btn-secondary {
    background: none;
    color: var(--paper);
    border: 1.5px solid rgba(245,240,232,0.3);
    border-radius: 8px;
    padding: 0.7rem 1.5rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }

  /* ── SCREEN: PROGRESS ── */
  .progress-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem;
    margin-bottom: 2rem;
  }
  @media (max-width: 600px) { .progress-grid { grid-template-columns: 1fr; } }
  .progress-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    box-shadow: var(--shadow);
  }
  .progress-card-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 1rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.5rem;
  }
  .fail-list { list-style: none; }
  .fail-list li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.6rem 0;
    border-bottom: 1px dotted var(--border);
    font-size: 0.85rem;
  }
  .fail-list li:last-child { border-bottom: none; }
  .fail-count {
    background: var(--fail-bg);
    color: var(--fail);
    border-radius: 99px;
    padding: 0.15rem 0.6rem;
    font-size: 0.75rem;
    font-weight: 700;
  }
  .retry-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 0.3rem 0.7rem;
    font-size: 0.75rem;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.15s;
    margin-left: 0.5rem;
  }
  .retry-btn:hover { background: var(--ink); }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .cal-day {
    aspect-ratio: 1;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    font-weight: 700;
  }
  .cal-day.has-study { background: var(--gold-light); color: var(--ink); }
  .cal-day.today { background: var(--accent); color: white; }
  .cal-day.empty { background: var(--unseen-bg); color: #ccc; }

  /* empty state */
  .empty-msg {
    text-align: center;
    padding: 2rem;
    color: #aaa;
    font-size: 0.88rem;
  }

  /* toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--ink);
    color: var(--paper);
    padding: 0.75rem 1.5rem;
    border-radius: 99px;
    font-size: 0.88rem;
    font-weight: 700;
    box-shadow: var(--shadow-deep);
    transition: transform 0.3s ease;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .screen.active { animation: fadeIn 0.25s ease; }

  /* ── RESET MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,26,46,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: var(--paper);
    border-radius: 14px;
    padding: 2rem 2.5rem;
    max-width: 360px;
    width: 90%;
    box-shadow: var(--shadow-deep);
    text-align: center;
    animation: fadeIn 0.2s ease;
  }
  .modal-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
  .modal-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    color: var(--ink);
  }
  .modal-desc {
    font-size: 0.85rem;
    color: #666;
    line-height: 1.7;
    margin-bottom: 1.5rem;
  }
  .modal-actions { display: flex; gap: 0.75rem; justify-content: center; }
  .btn-danger {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0.65rem 1.5rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-danger:hover { background: #6b1010; }
  .btn-cancel {
    background: none;
    color: var(--ink);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 0.65rem 1.5rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-cancel:hover { background: var(--paper-warm); }
</style>
</head>
<body>

<header>
  <div class="header-title">⚖ 会社法 逐条学習</div>
  <nav class="header-nav">
    <button class="nav-btn active" onclick="showScreen('home')">条文一覧</button>
    <button class="nav-btn" onclick="showScreen('progress')">学習記録</button>
    <button class="nav-btn" onclick="confirmReset()" style="border-color:rgba(192,57,43,0.5);color:#ffaaaa;">リセット</button>
  </nav>
</header>

<!-- HOME SCREEN -->
<div id="screen-home" class="screen active">
  <div class="home-hero">
    <h1>会社法 逐条学習アプリ</h1>
    <p>条文を選択 → 解説を読む → 問題に挑戦 → 合格で記録。2ヶ月で全条文制覇を目指そう。</p>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-stats">
      <div class="stat-item">
        <div class="stat-num passed" id="count-passed">0</div>
        <div class="stat-label">合格</div>
      </div>
      <div class="stat-item">
        <div class="stat-num failed" id="count-failed">0</div>
        <div class="stat-label">不正解あり</div>
      </div>
      <div class="stat-item">
        <div class="stat-num total" id="count-total">50</div>
        <div class="stat-label">収録条文</div>
      </div>
    </div>
    <div class="progress-bar-outer" style="flex:2;">
      <div class="progress-bar-inner" id="progress-bar" style="width:0%"></div>
    </div>
  </div>
  <div id="article-list-container"></div>
</div>

<!-- STUDY SCREEN -->
<div id="screen-study" class="screen">
  <div class="study-header">
    <button class="back-btn" onclick="showScreen('home')">← 一覧に戻る</button>
    <div id="study-nav" style="display:flex;gap:0.5rem;margin-left:auto;"></div>
  </div>
  <div id="study-content"></div>
</div>

<!-- PROGRESS SCREEN -->
<div id="screen-progress" class="screen">
  <div class="section-title">📊 学習進捗</div>
  <div class="progress-grid">
    <div class="progress-card">
      <div class="progress-card-title">📅 学習カレンダー（直近30日）</div>
      <div id="calendar-container"></div>
    </div>
    <div class="progress-card">
      <div class="progress-card-title">🎯 合格状況</div>
      <div id="progress-donut-text"></div>
    </div>
    <div class="progress-card" style="grid-column: 1 / -1;">
      <div class="progress-card-title">❌ 不正解だった条文（再挑戦可）</div>
      <ul class="fail-list" id="fail-list"></ul>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- RESET MODAL -->
<div class="modal-overlay" id="reset-modal">
  <div class="modal-box">
    <div class="modal-icon">⚠️</div>
    <div class="modal-title">学習履歴をリセット</div>
    <div class="modal-desc">合格・不正解の記録がすべて削除されます。<br>この操作は元に戻せません。</div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeReset()">キャンセル</button>
      <button class="btn-danger" onclick="doReset()">リセットする</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  ARTICLE DATA — 会社法 第1条〜第50条
// ══════════════════════════════════════════════
const ARTICLES = [
  // 第一章 総則
  {
    id: 1, chapter: "第一章 総則",
    title: "目的",
    text: "この法律は、会社の設立、組織、運営及び管理について定めることを目的とする。",
    explanation: `
      <p>会社法第1条は、<strong>会社法全体の目的・適用範囲</strong>を宣言する規定です。</p>

// ══════════════════════════════════════════════
//  STATE MANAGEMENT (localStorage)
// ══════════════════════════════════════════════
function getState() {
  try { return JSON.parse(localStorage.getItem('kaisha_ho_v1') || '{}'); }
  catch { return {}; }
}
function setState(s) {
  localStorage.setItem('kaisha_ho_v1', JSON.stringify(s));
}
function getArticleState(id) {
  const s = getState();
  return s[`a_${id}`] || { status: 'unseen', failCount: 0, studiedDates: [], failedQuestion: null };
}
function setArticleState(id, data) {
  const s = getState();
  s[`a_${id}`] = { ...getArticleState(id), ...data };
  setState(s);
}
function recordStudy(id) {
  const as = getArticleState(id);
  const today = new Date().toISOString().slice(0, 10);
  const dates = as.studiedDates || [];
  if (!dates.includes(today)) dates.push(today);
  setArticleState(id, { studiedDates: dates });
}

// ══════════════════════════════════════════════
//  SCREEN MANAGEMENT
// ══════════════════════════════════════════════
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (name === 'home') {
    document.querySelectorAll('.nav-btn')[0].classList.add('active');
    renderHome();
  } else if (name === 'progress') {
    document.querySelectorAll('.nav-btn')[1].classList.add('active');
    renderProgress();
  }
}

// ══════════════════════════════════════════════
//  HOME SCREEN
// ══════════════════════════════════════════════
function renderHome() {
  const passed = ARTICLES.filter(a => getArticleState(a.id).status === 'passed').length;
  const failed = ARTICLES.filter(a => getArticleState(a.id).status === 'failed').length;
  const total = ARTICLES.length;
  document.getElementById('count-passed').textContent = passed;
  document.getElementById('count-failed').textContent = failed;
  document.getElementById('count-total').textContent = total;
  document.getElementById('progress-bar').style.width = (passed / total * 100).toFixed(1) + '%';

  // Group by chapter
  const chapters = {};
  ARTICLES.forEach(a => {
    if (!chapters[a.chapter]) chapters[a.chapter] = [];
    chapters[a.chapter].push(a);
  });

  let html = '';
  html += '<div class="section-title">📖 条文一覧 <span>条文をクリックして学習開始</span></div>';
  for (const [ch, arts] of Object.entries(chapters)) {
    html += `<div class="chapter-group">
      <div class="chapter-label">${ch}</div>
      <div class="article-grid">`;
    arts.forEach(a => {
      const as = getArticleState(a.id);
      const statusLabel = as.status === 'passed' ? '✓ 合格' : as.status === 'failed' ? '✗ 不正解' : '未学習';
      const failBadge = as.failCount > 0 ? `<span class="fail-badge">${as.failCount}</span>` : '';
      html += `<button class="article-btn ${as.status}" onclick="startStudy(${a.id})">
        ${failBadge}
        第${a.id}条
        <span class="art-status">${statusLabel}</span>
      </button>`;
    });
    html += `</div></div>`;
  }
  document.getElementById('article-list-container').innerHTML = html;
}

// ══════════════════════════════════════════════
//  STUDY SCREEN
// ══════════════════════════════════════════════
let currentArticleId = null;

function startStudy(id) {
  currentArticleId = id;
  const art = ARTICLES.find(a => a.id === id);
  if (!art) return;
  recordStudy(id);

  // Prev/Next navigation
  const idx = ARTICLES.findIndex(a => a.id === id);
  let navHtml = '';
  if (idx > 0) navHtml += `<button class="back-btn" onclick="startStudy(${ARTICLES[idx-1].id})">← 前の条文</button>`;
  if (idx < ARTICLES.length - 1) navHtml += `<button class="back-btn" onclick="startStudy(${ARTICLES[idx+1].id})" style="margin-left:auto;">次の条文 →</button>`;
  document.getElementById('study-nav').innerHTML = navHtml;

  const as = getArticleState(id);
  const content = `
    <div class="article-card">
      <div class="article-number">会社法 第${art.id}条</div>
      <div class="article-title">${art.title}</div>
      <div class="article-text">${art.text}</div>
      <div class="explanation-block">
        <div class="explanation-label">逐条解説</div>
        <div class="explanation-text">${art.explanation}</div>
      </div>
    </div>

    <div class="quiz-card" id="quiz-card">
      <div class="quiz-label">● 確認問題</div>
      <div class="quiz-question">${art.quiz.question}</div>
      <div class="quiz-options" id="quiz-options">
        ${art.quiz.options.map((opt, i) => `
          <button class="quiz-option" onclick="answerQuiz(${i})" data-idx="${i}">
            <span class="opt-key">${['ア','イ','ウ','エ'][i]}</span>
            ${opt}
          </button>
        `).join('')}
      </div>
      <div class="quiz-result" id="quiz-result"></div>
      <div class="action-row" id="quiz-actions" style="display:none;">
        <button class="btn-primary" onclick="showScreen('home')">一覧に戻る</button>
        ${idx < ARTICLES.length - 1 ? `<button class="btn-secondary" onclick="startStudy(${ARTICLES[idx+1].id})">次の条文へ →</button>` : ''}
      </div>
    </div>
  `;
  document.getElementById('study-content').innerHTML = content;
  showScreen('study');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
}

function answerQuiz(selected) {
  const art = ARTICLES.find(a => a.id === currentArticleId);
  const as = getArticleState(currentArticleId);
  const isCorrect = selected === art.quiz.correct;

  // Disable all buttons
  document.querySelectorAll('.quiz-option').forEach((btn, i) => {
    btn.disabled = true;
    if (i === art.quiz.correct) btn.classList.add('correct');
    if (i === selected && !isCorrect) btn.classList.add('incorrect');
  });

  const resultEl = document.getElementById('quiz-result');
  if (isCorrect) {
    resultEl.className = 'quiz-result show correct-result';
    resultEl.innerHTML = `✅ <strong>正解！</strong><br>${art.quiz.explanation}`;
    setArticleState(currentArticleId, { status: 'passed' });
    showToast('🎉 正解！この条文は合格です');
  } else {
    resultEl.className = 'quiz-result show incorrect-result';
    resultEl.innerHTML = `❌ <strong>不正解。</strong>正解は「${art.quiz.options[art.quiz.correct]}」<br>${art.quiz.explanation}`;
    const newFailCount = (as.failCount || 0) + 1;
    setArticleState(currentArticleId, {
      status: 'failed',
      failCount: newFailCount,
      failedQuestion: art.quiz.question
    });
    showToast('❌ 不正解。後で再挑戦しよう！');
  }
  document.getElementById('quiz-actions').style.display = 'flex';
}

// ══════════════════════════════════════════════
//  PROGRESS SCREEN
// ══════════════════════════════════════════════
function renderProgress() {
  // Donut text
  const passed = ARTICLES.filter(a => getArticleState(a.id).status === 'passed').length;
  const failed = ARTICLES.filter(a => getArticleState(a.id).status === 'failed').length;
  const unseen = ARTICLES.length - passed - failed;
  const pct = (passed / ARTICLES.length * 100).toFixed(0);

  document.getElementById('progress-donut-text').innerHTML = `
    <div style="text-align:center;padding:1rem 0;">
      <div style="font-family:'Noto Serif JP',serif;font-size:3rem;font-weight:700;color:var(--success);">${pct}%</div>
      <div style="font-size:0.82rem;color:#888;margin-bottom:1rem;">合格率</div>
      <div style="display:flex;justify-content:center;gap:1.5rem;font-size:0.85rem;">
        <span style="color:var(--success);">✓ 合格 ${passed}条</span>
        <span style="color:var(--fail);">✗ 不正解 ${failed}条</span>
        <span style="color:var(--unseen);">○ 未学習 ${unseen}条</span>
      </div>
    </div>
  `;

  // Calendar
  const allDates = new Set();
  ARTICLES.forEach(a => {
    (getArticleState(a.id).studiedDates || []).forEach(d => allDates.add(d));
  });
  const today = new Date();
  let calHtml = '<div class="calendar-grid">';
  for (let i = 29; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const ds = d.toISOString().slice(0, 10);
    const isToday = i === 0;
    const hasStudy = allDates.has(ds);
    const cls = isToday ? 'today' : hasStudy ? 'has-study' : 'empty';
    calHtml += `<div class="cal-day ${cls}" title="${ds}">${d.getDate()}</div>`;
  }
  calHtml += '</div>';
  calHtml += '<div style="font-size:0.72rem;color:#aaa;margin-top:0.75rem;text-align:center;">直近30日の学習実績（<span style="color:var(--gold);">■</span>学習日 <span style="background:var(--accent);color:white;padding:0 4px;border-radius:2px;">今日</span>）</div>';
  document.getElementById('calendar-container').innerHTML = calHtml;

  // Fail list
  const failedArts = ARTICLES.filter(a => {
    const as = getArticleState(a.id);
    return as.status === 'failed' || as.failCount > 0;
  }).sort((a, b) => (getArticleState(b.id).failCount || 0) - (getArticleState(a.id).failCount || 0));

  if (failedArts.length === 0) {
    document.getElementById('fail-list').innerHTML = '<li class="empty-msg">不正解の条文はありません 🎉</li>';
  } else {
    document.getElementById('fail-list').innerHTML = failedArts.map(a => {
      const as = getArticleState(a.id);
      return `<li>
        <span>第${a.id}条 ${a.title}</span>
        <div style="display:flex;align-items:center;gap:0.5rem;flex-shrink:0;">
          <span class="fail-count">✗ ${as.failCount}回</span>
          <button class="retry-btn" onclick="startStudy(${a.id})">再挑戦</button>
        </div>
      </li>`;
    }).join('');
  }
}

// ══════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── INIT ──
renderHome();

// ══════════════════════════════════════════════
//  RESET
// ══════════════════════════════════════════════
function confirmReset() {
  document.getElementById('reset-modal').classList.add('show');
}
function closeReset() {
  document.getElementById('reset-modal').classList.remove('show');
}
function doReset() {
  localStorage.removeItem('kaisha_ho_v1');
  closeReset();
  showScreen('home');
  showToast('🗑️ 学習履歴をリセットしました');
}
</script>
